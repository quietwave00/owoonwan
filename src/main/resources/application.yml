spring:
  application:
    name: owoonwan
  profiles:
    default: local

app:
  firebase:
    enabled: true
    credentials: ${FIREBASE_SERVICE_ACCOUNT_JSON:${GOOGLE_APPLICATION_CREDENTIALS:}}

---
spring:
  config:
    activate:
      on-profile: local

app:
  firebase:
    enabled: true
  cors:
    allowed-origin-patterns: http://localhost:5173,http://127.0.0.1:5173

---
spring:
  config:
    activate:
      on-profile: prod

app:
  firebase:
    enabled: true
  cors:
    allowed-origin-patterns:
