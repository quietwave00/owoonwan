app = "replace-with-backend-app-name"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[checks]
  [checks.backend_tcp]
    type = "tcp"
    port = 8080
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
